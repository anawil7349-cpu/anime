<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Interactive 3D Birthday Gift!</title>
    <link href="https://fonts.googleapis.com/css2?family=Sriracha&family=Mali:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* =========================================
           --- ตัวแปรสีและขนาด (Themes & Responsive) ---
           ========================================= */
        :root {
            /* 🌌 Night Mode (Default) */
            --bg-gradient: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            --cake-1: linear-gradient(to right, #ff6b9e, #ff3377);
            --cake-1-side: #d12660;
            --cake-2: linear-gradient(to right, #4facfe, #00f2fe);
            --cake-2-side: #008bac;
            --cake-3: linear-gradient(to right, #fad961, #f76b1c);
            --cake-3-side: #c75400;
            
            /* สีข้อความเริ่มต้น (ตอนยังไม่มีฉากกระดาษ) */
            --text-main-color: #000000;
            --text-main-stroke: #e0005e;
            --text-shadow: 0 4px 15px rgba(255, 255, 255, 0.9), 0 0 20px #e7e7e7, 0 0 40px #ff0055;
            --hint-color: #ffd700;
            
            --star-opacity: 1;
            --cloud-opacity: 0;
            --ray-color: rgba(255, 255, 255, 0.1);

            --cake-scale: 1;
        }

        body.dreamy-mode {
            /* ☁️ Dreamy Mode (Pastel/Daylight) */
            --bg-gradient: linear-gradient(to bottom, #a1c4fd 0%, #c2e9fb 100%);
            --cake-1: linear-gradient(to right, #ffb6c1, #ffc0cb);
            --cake-1-side: #ff99a8;
            --cake-2: linear-gradient(to right, #a1c4fd, #c2e9fb);
            --cake-2-side: #8cb5f2;
            --cake-3: linear-gradient(to right, #fdfbfb, #ebedee);
            --cake-3-side: #dcdcdc;
            
            --text-main-color: #1a73e8; 
            --text-main-stroke: #0011ff; 
            --text-shadow: 0 4px 10px rgba(0,0,0,0.3), 0 0 20px rgba(255,255,255,0.9);
            --hint-color: #0d47a1;
            
            --star-opacity: 0;
            --cloud-opacity: 0.8;
            --ray-color: rgba(255, 255, 255, 0.4);
        }

        /* 📱 จัดการหน้าจอมือถือ */
        @media (max-width: 600px) {
            :root { --cake-scale: 0.65; }
            .cartoon-placeholder { top: 18% !important; bottom: auto !important; }
            .cp-left { left: 2% !important; }
            .cp-right { right: 2% !important; }
            .cake-container { margin-top: -15vh !important; }
            .text-container { top: 65% !important; bottom: 5vh !important; }
            .theme-toggle { padding: 3px 10px !important; font-size: 1rem !important; }
        }

        /* --- ตั้งค่าพื้นฐาน --- */
        body { background: var(--bg-gradient); height: 100vh; margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; font-family: 'Sriracha', cursive; perspective: 1000px; transition: background 1s ease; }
        body.is-shaking { animation: shake-screen 0.5s cubic-bezier(.36,.07,.19,.97) both; }

        /* --- ป๊อปอัปแจ้งเตือน In-App Browser --- */
        .in-app-warning { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); z-index: 999999; color: white; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; font-family: 'Mali', sans-serif; }
        .in-app-warning.show { display: flex; }
        .in-app-warning h2 { color: #ff3366; font-size: 2rem; margin-bottom: 15px; text-shadow: 0 0 15px rgba(255, 51, 102, 0.5); }
        .in-app-warning p { font-size: 1.2rem; line-height: 1.6; }
        .icon-dots { font-size: 1.5rem; background: #334155; padding: 2px 10px; border-radius: 8px; margin: 0 5px; display: inline-block; font-family: monospace; }
        .btn-close-warning { margin-top: 30px; padding: 10px 20px; background: transparent; border: 2px solid #64748b; border-radius: 10px; color: #94a3b8; font-family: 'Mali'; cursor: pointer; transition: 0.3s; }
        .btn-close-warning:hover { background: #64748b; color: white; }

        /* --- ปุ่มสลับโหมด --- */
        .theme-toggle { position: absolute; top: 15px; right: 15px; z-index: 1000; background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.5); border-radius: 30px; padding: 5px 15px; font-size: 1.5rem; cursor: pointer; backdrop-filter: blur(5px); transition: all 0.3s ease; display: flex; align-items: center; gap: 5px; }
        .theme-toggle:hover { background: rgba(255,255,255,0.4); transform: scale(1.05); }
        .theme-toggle span { font-family: 'Mali', sans-serif; font-size: 1rem; color: #fff; font-weight: bold; text-shadow: 0 1px 3px rgba(0,0,0,0.5); }

        /* --- เอฟเฟกต์ฉากหลัง --- */
        .stars { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: var(--star-opacity); transition: opacity 1s ease; background-image: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px), radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px), radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px); background-size: 550px 550px, 350px 350px, 250px 250px; animation: starMove 200s linear infinite; z-index: 1; }
        .light-rays { position: absolute; top: 50%; left: 50%; width: 150vmax; height: 150vmax; background: conic-gradient(from 0deg, transparent 0%, var(--ray-color) 10%, transparent 20%, var(--ray-color) 30%, transparent 40%, var(--ray-color) 50%, transparent 60%, var(--ray-color) 70%, transparent 80%, var(--ray-color) 90%, transparent 100%); transform: translate(-50%, -50%); animation: rotate-rays 20s linear infinite; opacity: 0; z-index: 5; transition: opacity 1s ease, background 1s ease; }
        body.is-opened .light-rays { opacity: 1; }
        .clouds-container { position: absolute; width: 100%; height: 100%; top: 0; left: 0; z-index: 2; pointer-events: none; opacity: var(--cloud-opacity); transition: opacity 1s ease; }
        .cloud { position: absolute; background: #fff; border-radius: 50px; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1)); animation: drift linear infinite; }
        .cloud::before, .cloud::after { content: ''; position: absolute; background: #fff; border-radius: 50%; }
        .c1 { width: 150px; height: 50px; top: 15%; left: -200px; animation-duration: 40s; } .c1::before { width: 70px; height: 70px; top: -30px; left: 20px; } .c1::after { width: 50px; height: 50px; top: -20px; right: 20px; }
        .c2 { width: 200px; height: 60px; top: 60%; left: -300px; animation-duration: 55s; animation-delay: 5s; transform: scale(0.8); } .c2::before { width: 80px; height: 80px; top: -40px; left: 30px; } .c2::after { width: 60px; height: 60px; top: -30px; right: 30px; }
        @keyframes drift { to { transform: translateX(120vw); } }

        /* --- โซนงานวันเกิด --- */
        .party-content { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; transform: scale(0.5); transition: all 1.2s cubic-bezier(0.34, 1.56, 0.64, 1); z-index: 10; transform-style: preserve-3d; }
        body.is-opened .party-content { opacity: 1; transform: scale(1); transition-delay: 0.3s; }

        /* =========================================
           ✨ อัปเกรดเค้ก 3D ให้สมจริงขึ้น ✨
           ========================================= */
        .cake-container { position: relative; width: 280px; height: 220px; transform-style: preserve-3d; transform: rotateX(15deg) scale(var(--cake-scale)); animation: float-cake-3d 3s ease-in-out infinite alternate; transition: all 1s ease; margin-top: -10vh; }
        
        .cake-board { position: absolute; top: 130px; width: 340px; height: 130px; background: repeating-linear-gradient(45deg, #d4af37, #d4af37 10px, #c5a017 10px, #c5a017 20px); border-radius: 50%; left: 50%; transform: translateX(-50%) translateZ(-70px); box-shadow: 0 20px 30px rgba(0,0,0,0.6), inset 0 -5px 15px rgba(0,0,0,0.5); z-index: 0; }
        .cake-board::before { content: ''; position: absolute; top: -8px; left: 0; width: 100%; height: 100%; border-radius: 50%; background: #fcf6ba; box-shadow: inset 0 5px 15px rgba(0,0,0,0.2); }

        .layer { position: absolute; display: block; border-radius: 50%; left: 50%; transform: translateX(-50%); transform-style: preserve-3d; transition: background 1s ease; }
        .layer::after { content: ''; position: absolute; width: 100%; height: 100%; border-radius: 50%; box-shadow: inset 0 -15px 25px rgba(0,0,0,0.4), inset 0 5px 15px rgba(255,255,255,0.5); pointer-events: none; z-index: 10;}
        .layer::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%; filter: brightness(0.85); box-shadow: 0 15px 25px rgba(0,0,0,0.4); transition: background-color 1s ease; }
        
        .layer-bottom { top: 120px; width: 280px; height: 100px; z-index: 1; background: var(--cake-1); } .layer-bottom::before { background-color: var(--cake-1-side); transform: translateZ(-50px); }
        .layer-middle { top: 75px; width: 220px; height: 85px; z-index: 2; background: var(--cake-2); } .layer-middle::before { background-color: var(--cake-2-side); transform: translateZ(-35px); }
        .layer-top { top: 35px; width: 160px; height: 75px; z-index: 3; background: var(--cake-3); } .layer-top::before { background-color: var(--cake-3-side); transform: translateZ(-25px); }
        
        .icing { position: absolute; top: 18px; left: 50%; width: 170px; height: 75px; border-radius: 50%; background: repeating-conic-gradient(from 0deg, #ffffff 0deg 20deg, #f2f2f2 20deg 40deg); z-index: 4; opacity: 0.95; transform: translateX(-50%) translateZ(5px); box-shadow: inset 0 -5px 10px rgba(0,0,0,0.1), 0 5px 15px rgba(0,0,0,0.2); filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }
        .icing::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%; background-image: radial-gradient(circle, #ff3366 3px, transparent 4px), radial-gradient(circle, #00ffcc 3px, transparent 4px), radial-gradient(circle, #ffd700 3px, transparent 4px), radial-gradient(circle, #aa00ff 3px, transparent 4px), radial-gradient(circle, #ff8c00 3px, transparent 4px); background-size: 30px 30px, 45px 25px, 25px 40px, 35px 35px, 40px 40px; background-position: 5px 5px, 15px 10px, 20px 20px, 10px 15px, 30px 5px; z-index: 5; opacity: 0.8; }

        /* =========================================
           ✨ ระบบเป่าเทียน (ปรับตำแหน่งให้ปักเค้ก & กดง่ายขึ้น) ✨
           ========================================= */
        .candle-container { 
            position: absolute; 
            /* ดันเทียนลงมาปักในเค้ก (ปรับจาก top: 0 เป็น top: 15px) */
            top: 20px; 
            left: 50%; 
            transform: translateX(-50%) translateZ(25px); 
            z-index: 100; 
            display: flex; 
            gap: 15px; 
            transform-style: preserve-3d; 
        }
        .candle { 
            position: relative; 
            width: 10px; 
            height: 35px; 
            background: repeating-linear-gradient(45deg, #00ffcc, #00ffcc 5px, #fff 5px, #fff 10px); 
            border-radius: 3px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.3); 
        }
        /* ขยับกล่องรับสัมผัส (Hitbox) ให้ลงมาครอบเฉพาะบริเวณยอดเทียนและเปลวไฟพอดี */
        .flame { 
            position: absolute; 
            top: -25px; /* ดึงกล่องลงมาให้ตรงกับไฟ */
            left: 50%; 
            transform: translateX(-50%); 
            width: 50px; /* ลดความกว้างลงนิดนึงกันกดโดนเทียนข้างๆ */
            height: 60px; /* ความสูงพอดีกับไฟ */
            cursor: pointer; 
            z-index: 150; 
            background-color: rgba(255,255,255,0); /* สีโปร่งใส */
        }
        /* ตัวเปลวไฟจริงๆ */
        .flame::after { 
            content: ''; 
            position: absolute; 
            bottom: 35px; /* จัดตำแหน่งไฟให้อยู่เหนือเทียนนิดนึง */
            left: 50%; 
            transform: translateX(-50%); 
            width: 12px; 
            height: 18px; 
            border-radius: 50% 50% 20% 20%; 
            background: radial-gradient(ellipse at bottom, #ffff00 0%, #ff9900 60%, #ff3300 100%); 
            box-shadow: 0 -5px 15px #ffcc00, 0 -10px 30px #ff6600, 0 -20px 50px #ff0000; 
            animation: flicker 0.5s infinite alternate; 
            transition: all 0.3s ease; 
        }
        .flame.blown-out { pointer-events: none; } 
        .flame.blown-out::after { transform: translateX(-50%) scale(0); opacity: 0; box-shadow: none; animation: none; }

        /* --- ข้อความ Typewriter --- */
        .text-container { 
            position: absolute; 
            top: 70%; 
            bottom: 5vh; 
            left: 0;
            width: 100%;
            overflow-y: auto; 
            text-align: center; 
            padding: 20px; 
            z-index: 20; 
            transform: translateZ(30px); 
            display: flex; 
            flex-direction: column; 
            justify-content: flex-start; 
            align-items: center; 
            box-sizing: border-box; 
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.4) transparent;
            transition: all 0.5s ease;
            max-width: 90%; 
            margin: 0 auto; 
            left: 50%;
            transform: translateX(-50%) translateZ(30px);
        }
        
        .text-container.paper-background {
            background: #fffdf2; 
            background-image: linear-gradient(to bottom, rgba(255,255,255,0.8), rgba(255,250,240,0.5)), url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='a'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.1' numOctaves='3' result='noise'/%3E%3CfeColorMatrix type='matrix' values='0.9 0 0 0 0 0 0.85 0 0 0 0 0 0.8 0 0 0 0 0 0.3 0'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23a)' opacity='0.4'/%3E%3C/svg%3E");
            border: 3px solid #e8d8c0; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); 
            --text-main-color: #ff0055 !important; 
            --text-main-stroke: transparent !important; 
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2) !important; 
        }

        body.dreamy-mode .text-container.paper-background {
             --text-main-color: #0d47a1 !important;
        }
        
        .text-container::-webkit-scrollbar { width: 5px; } .text-container::-webkit-scrollbar-track { background: transparent; } .text-container::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.4); border-radius: 10px; }
        .hint-text { font-family: 'Mali', sans-serif; font-size: clamp(1rem, 4vw, 1.5rem); font-weight: 600; color: var(--hint-color); text-shadow: 0 2px 5px rgba(0,0,0,0.4), 0 0 10px rgba(255,255,255,0.8); animation: pulse-clear 1.5s infinite alternate; transition: color 1s ease, opacity 0.5s ease; margin-bottom: 10px;}
        .typewriter-text { font-family: 'Mali', sans-serif; font-size: clamp(1.2rem, 5vw, 2.2rem); line-height: 1.6; font-weight: 600; color: var(--text-main-color); -webkit-text-stroke: 1.5px var(--text-main-stroke); text-shadow: var(--text-shadow); transition: all 0.5s ease; margin-top: 5px; max-width: 100%; }
        .cursor { display: inline-block; width: 4px; height: 1.2em; background-color: var(--text-main-color); vertical-align: text-bottom; margin-left: 2px; animation: blink 0.8s infinite; opacity: 0; }
        body.typing-active .cursor { opacity: 1; }

        /* --- ของตกแต่ง --- */
        .sparkles-container { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 15; } .sparkle { position: absolute; width: 5px; height: 5px; background: #ffd700; border-radius: 50%; box-shadow: 0 0 10px #ffd700, 0 0 20px #ffffff; animation: float-sparkle 3s ease-in-out infinite; opacity: 0; } body.is-opened .sparkle { opacity: 1; } .sp1 { top: 30%; left: 30%; animation-delay: 0s; } .sp2 { top: 70%; left: 70%; animation-delay: 0.5s; } .sp3 { top: 40%; left: 80%; animation-delay: 1s; } .sp4 { top: 80%; left: 20%; animation-delay: 1.5s; } .sp5 { top: 20%; left: 60%; animation-delay: 2s; }
        .cartoon-placeholder { position: absolute; font-size: 4rem; top: 20%; filter: drop-shadow(0 0 20px rgba(255,255,255,0.6)); animation: bounce-cartoon 2s ease-in-out infinite; z-index: 5;} .cp-left { left: 15%; animation-delay: 0s; } .cp-right { right: 15%; animation-delay: 1s; }
        
        /* --- กล่องของขวัญ --- */
        .gift-container { position: absolute; z-index: 100; cursor: pointer; animation: jiggle 2s infinite ease-in-out; transition: all 0.5s ease; display: flex; flex-direction: column; align-items: center; filter: drop-shadow(0 0 20px rgba(255, 51, 102, 0.5)); }
        .gift-lid { width: 170px; height: 40px; background-color: #ff3366; border-radius: 5px; position: relative; box-shadow: 0 5px 10px rgba(0,0,0,0.3); transition: transform 0.5s ease, opacity 0.5s ease; z-index: 2; background: linear-gradient(to bottom, #ff5a82, #ff3366); }
        .gift-lid::before, .gift-lid::after { content: ''; position: absolute; width: 30px; height: 30px; border: 5px solid #ffd700; border-radius: 50%; bottom: 20px; box-shadow: 0 0 10px #ffd700; } .gift-lid::before { left: 40px; border-bottom-color: transparent; border-right-color: transparent; transform: rotate(-45deg); } .gift-lid::after { right: 40px; border-bottom-color: transparent; border-left-color: transparent; transform: rotate(45deg); }
        .lid-ribbon { position: absolute; width: 25px; height: 100%; background-color: #ffd700; left: 50%; transform: translateX(-50%); box-shadow: 0 0 5px #ffd700; }
        .gift-box { width: 150px; height: 130px; background-color: #e60039; position: relative; border-radius: 0 0 10px 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.4); transition: transform 0.5s ease, opacity 0.5s ease; z-index: 1; background: linear-gradient(to bottom, #ff3366, #c70039); }
        .box-ribbon { position: absolute; width: 25px; height: 100%; background-color: #ffd700; left: 50%; transform: translateX(-50%); box-shadow: 0 0 5px #ffd700; }
        .click-text { color: #fff; text-align: center; margin-top: 25px; font-size: 1.5rem; font-weight: bold; letter-spacing: 2px; animation: pulse-clear 1s infinite alternate; transition: opacity 0.3s ease; text-shadow: 0 4px 10px rgba(0,0,0,0.8), 0 0 15px #ff3366; }
        body.is-opened .gift-lid { transform: translateY(-120px) rotate(20deg) scale(1.1); opacity: 0; } body.is-opened .gift-box { transform: translateY(120px) scale(0.7); opacity: 0; } body.is-opened .click-text { animation: none; opacity: 0; visibility: hidden; } body.is-opened .gift-container { pointer-events: none; }

        /* --- Elements ลอยด้วย JS --- */
        .firework-particle { position: absolute; width: 6px; height: 6px; border-radius: 50%; left: var(--startX); top: var(--startY); background-color: var(--color); z-index: 2; pointer-events: none; box-shadow: 0 0 8px currentColor; animation: realistic-explosion 1.8s ease-out forwards; }
        .balloon { position: absolute; bottom: -150px; width: 45px; height: 60px; border-radius: 50%; background-color: var(--color); box-shadow: inset -10px -10px 20px rgba(0,0,0,0.2), inset 10px 10px 20px rgba(255,255,255,0.4); z-index: 5; pointer-events: none; animation: floatUp var(--duration) linear forwards, sway var(--swayDuration) ease-in-out infinite alternate; } .balloon::after { content: ''; position: absolute; bottom: -20px; left: 50%; width: 2px; height: 25px; background: rgba(255,255,255,0.6); transform: translateX(-50%); }
        .floating-emoji { position: absolute; bottom: -100px; font-size: 2.5rem; z-index: 6; pointer-events: none; filter: drop-shadow(0 0 10px rgba(255,255,255,0.4)); animation: floatUp var(--duration) linear forwards, sway var(--swayDuration) ease-in-out infinite alternate; }
        .confetti { position: absolute; width: 10px; height: 10px; background: #ffd700; top: 50%; left: 50%; z-index: 1000; pointer-events: none; opacity: 0; }

        /* --- Animations --- */
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        @keyframes jiggle { 0%, 100% { transform: rotate(-3deg) scale(1); } 50% { transform: rotate(3deg) scale(1.05); } }
        @keyframes pulse-clear { from { opacity: 0.8; transform: scale(1); } to { opacity: 1; transform: scale(1.05); } }
        @keyframes flicker { 0% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(0.9, 1.1) rotate(-2deg); height: 16px; } 100% { transform: translateX(-50%) scale(1.1, 0.9) rotate(2deg); } }
        @keyframes starMove { from { background-position: 0 0, 0 0, 0 0; } to { background-position: -1000px 500px, -500px 1000px, 500px 500px; } }
        @keyframes rotate-rays { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }
        @keyframes float-sparkle { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(20px, -20px); } }
        @keyframes bounce-cartoon { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-15px) rotate(5deg); } }
        @keyframes shake-screen { 10%, 90% { transform: translate3d(-2px, 0, 0); } 20%, 80% { transform: translate3d(4px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-6px, 0, 0); } 40%, 60% { transform: translate3d(6px, 0, 0); } }
        @keyframes confetti-explosion { 0% { transform: translate(0, 0) rotate(0deg); opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)) rotate(var(--rot)); opacity: 0; } }
        @keyframes realistic-explosion { 0% { transform: translate(0, 0) scale(1); opacity: 1; } 100% { transform: translate(var(--endX), var(--endY)) scale(0.5); opacity: 0; } }
        @keyframes floatUp { to { transform: translateY(-120vh) scale(var(--scale)); } }
        @keyframes sway { from { margin-left: -30px; } to { margin-left: 30px; } }
        @keyframes float-cake-3d { 0% { transform: rotateX(15deg) translateY(0px) scale(var(--cake-scale)); } 100% { transform: rotateX(15deg) translateY(-20px) scale(var(--cake-scale)); } }
    </style>
</head>
<body>

    <div class="in-app-warning" id="inAppWarning">
        <h2>⚠️ แจ้งเตือน!</h2>
        <p>ภาพอาจจะกระตุกเพราะคุณเปิดผ่านแอปแชท</p>
        <p>เพื่อดูการ์ด 3D ให้ลื่นไหลและสวยงามที่สุด<br>
        กรุณากดปุ่ม <span class="icon-dots">⋯</span> หรือ <span class="icon-dots">⋮</span> ที่มุมขวาบน<br>
        แล้วเลือก <b>"เปิดในเบราว์เซอร์"</b> (Open in Browser) นะครับ 🚀</p>
        
        <button class="btn-close-warning" onclick="document.getElementById('inAppWarning').style.display='none'">
            ฉันเข้าใจแล้ว
        </button>
    </div>

    <button class="theme-toggle" id="themeToggle" title="เปลี่ยนบรรยากาศ">
        <span id="themeIcon">🌙</span> <span id="themeText">Night</span>
    </button>

    <audio id="bgMusic" loop>
        <source src="nastelbom-happy-birthday-471481.mp3" type="audio/mpeg">
    </audio>

    <div class="stars"></div>
    <div class="clouds-container">
        <div class="cloud c1"></div><div class="cloud c2"></div>
    </div>
    <div class="light-rays"></div>
    
    <div class="gift-container" id="giftBox">
        <div class="gift-lid"><div class="lid-ribbon"></div></div>
        <div class="gift-box"><div class="box-ribbon"></div></div>
        <div class="click-text">คลิกเพื่อเปิด! 👆</div>
    </div>

    <div class="party-content">
        <div class="sparkles-container">
            <div class="sparkle sp1"></div><div class="sparkle sp2"></div><div class="sparkle sp3"></div><div class="sparkle sp4"></div><div class="sparkle sp5"></div>
        </div>
        
        <div class="cartoon-placeholder cp-left">🥳</div>
        <div class="cartoon-placeholder cp-right">🎈</div>

        <div class="cake-container">
            <div class="cake-board"></div> 
            
            <div class="candle-container">
                <div class="candle"><div class="flame" title="แตะเพื่อดับไฟ!"></div></div>
                <div class="candle"><div class="flame" title="แตะเพื่อดับไฟ!"></div></div>
                <div class="candle"><div class="flame" title="แตะเพื่อดับไฟ!"></div></div>
            </div>
            <div class="layer layer-top"></div>
            <div class="icing"></div>
            <div class="layer layer-middle"></div>
            <div class="layer layer-bottom"></div>
        </div>

        <div class="text-container" id="scrollContainer">
            <div class="hint-text" id="hintText">👆 ลองแตะที่ไฟเพื่อเป่าเทียนสิ!</div>
            <div class="typewriter-text">
                <span id="typedMsg"></span><span class="cursor"></span>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 0. ระบบตรวจจับ In-App Browser
        // ==========================================
        document.addEventListener("DOMContentLoaded", function() {
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            const isInApp = (ua.indexOf("FBAN") > -1) || (ua.indexOf("FBAV") > -1) || 
                            (ua.indexOf("Line") > -1) || 
                            (ua.indexOf("Instagram") > -1) || 
                            (ua.indexOf("MicroMessenger") > -1); 
            
            if (isInApp) {
                document.getElementById('inAppWarning').classList.add('show');
            }
        });

        // ==========================================
        // 1. ระบบรับข้อมูลจาก URL
        // ==========================================
        const urlParams = new URLSearchParams(window.location.search);
        const customText = urlParams.get('text');
        
        let messages = [
            "สุขสันต์วันเกิดนะครับ! 🎂✨",
            "ขอให้ปีนี้เป็นปีที่ใจดีกับคุณมากๆ",
            "มีความสุข สุขภาพแข็งแรง",
            "และมีรอยยิ้มที่สดใสแบบนี้ตลอดไปเลยนะ 💖"
        ];

        if (customText) {
            messages = customText.split('|');
        }

        const customImgParam = urlParams.get('img');
        let userPhotoUrls = []; 

        if (customImgParam) {
            const decodedParam = decodeURIComponent(customImgParam);
            userPhotoUrls = decodedParam.split(',').filter(url => url.trim() !== '');
            
            if (userPhotoUrls.length > 0) {
                const placeholders = document.querySelectorAll('.cartoon-placeholder');
                placeholders.forEach((el, index) => {
                    const imgUrl = userPhotoUrls[index % userPhotoUrls.length];
                    el.innerHTML = `<img src="${imgUrl}" class="user-photo" alt="Birthday Photo">`;
                    el.style.filter = 'none'; 
                });
                
                const style = document.createElement('style');
                style.innerHTML = `
                    .user-photo { width: 150px; height: 150px; border-radius: 8px; object-fit: cover; border: 5px solid white; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
                    @media (max-width: 600px) { .user-photo { width: 100px !important; height: 100px !important; border-width: 3px !important; } }
                `;
                document.head.appendChild(style);
            }
        }

        // ==========================================
        // 2. ระบบการทำงานหลักของการ์ด
        // ==========================================
        
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const themeText = document.getElementById('themeText');
        let isDreamy = false;

        themeToggle.addEventListener('click', () => {
            isDreamy = !isDreamy;
            document.body.classList.toggle('dreamy-mode', isDreamy);
            themeIcon.innerText = isDreamy ? '☀️' : '🌙';
            themeText.innerText = isDreamy ? 'Dreamy' : 'Night';
        });

        const giftBox = document.getElementById('giftBox');
        const bgMusic = document.getElementById('bgMusic');
        let partyStarted = false;
        let intervals = []; 

        giftBox.addEventListener('click', function() {
            if(partyStarted) return;
            partyStarted = true;
            
            bgMusic.play().catch(e => console.log("กรุณาอนุญาตให้เล่นเสียงในเบราว์เซอร์"));
            
            document.body.classList.add('is-opened');
            document.body.classList.add('is-shaking');
            setTimeout(() => document.body.classList.remove('is-shaking'), 500);
            
            createConfetti();

            intervals.push(setInterval(createBalloon, 2000));
            intervals.push(setInterval(createFloatingEmoji, 1500));
        });

        const flames = document.querySelectorAll('.flame');
        const hintText = document.getElementById('hintText');
        let blownCount = 0;

        flames.forEach(flame => {
            flame.addEventListener('click', function() {
                if (!this.classList.contains('blown-out')) {
                    this.classList.add('blown-out');
                    blownCount++;
                    
                    createConfetti(20); 

                    if (blownCount === flames.length) {
                        hintText.style.opacity = '0'; 
                        setTimeout(() => {
                            hintText.style.display = 'none';
                            startPartyAndTypewriter(); 
                        }, 500);
                    }
                }
            });
        });

        function startPartyAndTypewriter() {
            intervals.push(setInterval(launchRealisticFirework, 1200));
            createConfetti(100);

            document.body.classList.add('typing-active');
            
            const scrollBox = document.getElementById('scrollContainer'); 
            scrollBox.classList.add('paper-background');

            let lineIndex = 0;
            let charIndex = 0;
            const typedEl = document.getElementById('typedMsg');
            
            function typeWriter() {
                if (lineIndex < messages.length) {
                    if (charIndex < messages[lineIndex].length) {
                        typedEl.innerHTML += messages[lineIndex].charAt(charIndex);
                        charIndex++;
                        
                        scrollBox.scrollTop = scrollBox.scrollHeight;
                        
                        setTimeout(typeWriter, 100); 
                    } else {
                        typedEl.innerHTML += "<br><br>";
                        lineIndex++;
                        charIndex = 0;
                        
                        scrollBox.scrollTop = scrollBox.scrollHeight;
                        
                        setTimeout(typeWriter, 800); 
                    }
                }
            }
            setTimeout(typeWriter, 1000); 
        }

        function launchRealisticFirework() {
            if(isDreamy && Math.random() > 0.5) return; 

            const startX = Math.random() * window.innerWidth + 'px';
            const startY = (Math.random() * window.innerHeight * 0.6) + 'px';
            const colors = isDreamy 
                ? ['#ffb6c1', '#a1c4fd', '#fdfbfb', '#ff99a8'] 
                : ['#ff3366', '#ffd700', '#00ffcc', '#ff9933', '#ffffff', '#ff6b9e']; 
                
            const baseColor = colors[Math.floor(Math.random() * colors.length)];
            const particleCount = (window.innerWidth < 600) ? 40 : (isDreamy ? 50 : 80); 

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('firework-particle');
                particle.style.setProperty('--startX', startX);
                particle.style.setProperty('--startY', startY);
                particle.style.setProperty('--color', baseColor);
                
                const angle = Math.random() * Math.PI * 2;
                const distance = 80 + Math.random() * 250; 
                particle.style.setProperty('--endX', Math.cos(angle) * distance + 'px');
                particle.style.setProperty('--endY', Math.sin(angle) * distance + 'px');
                
                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 1800);
            }
        }

        function createBalloon() {
            const balloon = document.createElement('div');
            balloon.classList.add('balloon');
            const colors = isDreamy
                ? ['#ffb6c1', '#a1c4fd', '#fdfbfb', '#ffe1e8', '#d4e6ff'] 
                : ['#ff3366', '#ffd700', '#00ffcc', '#ff9933', '#ff6b9e', '#4facfe'];
            balloon.style.setProperty('--color', colors[Math.floor(Math.random() * colors.length)]);
            balloon.style.left = Math.random() * 90 + '%';
            
            const scale = 0.6 + Math.random() * 0.4;
            balloon.style.transform = `scale(${scale})`;
            balloon.style.setProperty('--scale', scale);
            balloon.style.setProperty('--duration', (15 + Math.random() * 10) + 's');
            balloon.style.setProperty('--swayDuration', (3 + Math.random() * 3) + 's');
            
            document.body.appendChild(balloon);
            setTimeout(() => balloon.remove(), 25000);
        }

        function createFloatingEmoji() {
            const emojiEl = document.createElement('div');
            emojiEl.classList.add('floating-emoji');
            
            const emojis = isDreamy 
                ? ['☁️', '🦄', '💖', '✨', '🧁']
                : ['🥳', '🥳', '🎉', '🎁', '✨', '🎈'];
            
            if (userPhotoUrls.length > 0 && Math.random() > 0.4) { 
                const randomImgUrl = userPhotoUrls[Math.floor(Math.random() * userPhotoUrls.length)];
                emojiEl.innerHTML = `<img src="${randomImgUrl}" style="width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 3px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.3);">`;
                emojiEl.style.filter = 'none';
            } else {
                emojiEl.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            }

            emojiEl.style.left = Math.random() * 90 + '%';
            
            const scale = 0.5 + Math.random() * 0.5;
            emojiEl.style.transform = `scale(${scale})`;
            emojiEl.style.setProperty('--scale', scale);
            emojiEl.style.setProperty('--duration', (12 + Math.random() * 8) + 's');
            emojiEl.style.setProperty('--swayDuration', (2 + Math.random() * 3) + 's');
            
            document.body.appendChild(emojiEl);
            setTimeout(() => emojiEl.remove(), 20000);
        }

        function createConfetti(amount = 80) {
            const colors = isDreamy
                ? ['#ffb6c1', '#a1c4fd', '#ffffff']
                : ['#ff6b9e', '#4facfe', '#fad961', '#ffffff', '#00ffcc'];
                
            for (let i = 0; i < amount; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                const angle = Math.random() * Math.PI * 2;
                const distance = 150 + Math.random() * 300;
                confetti.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
                confetti.style.setProperty('--ty', Math.sin(angle) * distance + 'px');
                confetti.style.setProperty('--rot', (Math.random() * 360 * 2) + 'deg');
                confetti.style.animation = `confetti-explosion ${1 + Math.random() * 1.5}s ease-out forwards`;
                
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 2500);
            }
        }
    </script>

</body>
</html>
