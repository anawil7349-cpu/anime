<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สร้างการ์ดวันเกิด 3D ของคุณ</title>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Mali', sans-serif; }
        body { background-color: #f0f4f8; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        .container { background: white; width: 100%; max-width: 500px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #ff3366; margin-bottom: 20px; font-size: 1.8rem; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input[type="text"], textarea { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 1rem; outline: none; transition: border 0.3s; }
        input[type="text"]:focus, textarea:focus { border-color: #ff3366; }
        
        input[type="file"] { width: 100%; padding: 10px; border: 2px dashed #cbd5e1; border-radius: 10px; cursor: pointer; background: #f8fafc; transition: all 0.3s ease; }
        input[type="file"]:hover { border-color: #ff3366; }
        .upload-status { font-size: 0.9rem; margin-top: 5px; color: #10b981; font-weight: bold; min-height: 20px;}
        
        .btn { width: 100%; padding: 15px; background: linear-gradient(to right, #ff3366, #ff6b9e); color: white; border: none; border-radius: 10px; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; margin-top: 10px; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 51, 102, 0.4); }
        .btn:disabled { background: #cbd5e1; cursor: not-allowed; box-shadow: none; transform: none; }

        #paymentSection, #resultSection { display: none; text-align: center; margin-top: 20px; padding-top: 20px; border-top: 2px dashed #e2e8f0; }
        .result-box { background: #f8fafc; padding: 15px; border-radius: 10px; margin-bottom: 15px; word-break: break-all; font-size: 1.2rem; color: #ff3366; border: 1px solid #e2e8f0; text-align: center; font-weight: bold;}
        
        .btn-copy { background: #4facfe; margin-bottom: 10px; }
        .btn-test { background: #10b981; }
        .hint-text-limit { font-size: 0.8rem; color: #64748b; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>✨ สร้างการ์ดวันเกิด 3D</h1>
        
        <div id="formSection">
            <div class="form-group">
                <label>ข้อความอวยพร (ถ้าพิมพ์ต่อไม่ได้ให้เขียนบรรทัดใหม่ด้านล่าง):</label>
                <textarea id="msgInput" rows="4" placeholder="สุขสันต์วันเกิดนะ!&#10;ขอให้มีความสุขมากๆ 💖"></textarea>
                <div class="hint-text-limit">* จำกัดความยาว 20 ตัวอักษร/บรรทัด</div>
            </div>
            
            <div class="form-group">
                <label>อัปโหลดรูปภาพเจ้าของวันเกิด (รูปที่ 1):</label>
                <input type="file" id="imageUpload1" accept="image/*">
                <div class="upload-status" id="uploadStatus1"></div>
                <input type="hidden" id="imgInputUrl1"> 
            </div>

            <div class="form-group">
                <label>อัปโหลดรูปภาพเจ้าของวันเกิด (รูปที่ 2 - ไม่บังคับ):</label>
                <input type="file" id="imageUpload2" accept="image/*">
                <div class="upload-status" id="uploadStatus2"></div>
                <input type="hidden" id="imgInputUrl2"> 
            </div>
            
            <button class="btn" id="generateBtn">สร้างการ์ดของขวัญ</button>
        </div>

        <div id="paymentSection">
            </div>

        <div id="resultSection">
            <h2 style="color: #10b981; margin-bottom: 10px;">🎉 การ์ดของคุณพร้อมแล้ว!</h2>
            <p style="color: #666; font-size: 0.9rem; margin-bottom: 10px;">ก๊อปปี้ลิงก์ด้านล่างนี้ ส่งให้คนพิเศษได้เลย</p>
            <div class="result-box" id="finalLink"></div>
            <button class="btn btn-copy" id="copyBtn">📋 ก๊อปปี้ลิงก์</button>
            <a href="#" target="_blank" class="btn btn-test" id="testBtn" style="display: block; text-decoration: none; text-align: center;">▶️ กดเพื่อดูการ์ด</a>
        </div>
    </div>

    <script>
        // --- ⚙️ การตั้งค่าระบบ API ⚙️ ---
        const IMGBB_API_KEY = "d29f8833a989e9577e146d4f77d54c90"; 
        const BASE_CARD_URL = "card.html"; 

        let generatedUrl = "";
        let uploadingCount = 0; 

        const formSection = document.getElementById('formSection');
        const resultSection = document.getElementById('resultSection');
        const generateBtn = document.getElementById('generateBtn');
        const copyBtn = document.getElementById('copyBtn');
        const finalLinkBox = document.getElementById('finalLink');
        const testBtn = document.getElementById('testBtn');
        const msgInput = document.getElementById('msgInput'); 

        // --- ระบบ 0: จำกัดจำนวนตัวอักษร 20 ก้อน/บรรทัด ---
        const segmenter = new Intl.Segmenter('th-TH', { granularity: 'grapheme' });

        msgInput.addEventListener('input', function() {
            let text = this.value;
            let lines = text.split('\n');
            let formattedLines = lines.map(line => {
                let graphemes = Array.from(segmenter.segment(line)).map(s => s.segment);
                if (graphemes.length > 20) {
                    return graphemes.slice(0, 20).join(''); 
                }
                return line;
            });
            let newText = formattedLines.join('\n'); 
            
            if (text !== newText) {
                let cursorPosition = this.selectionStart; 
                let diff = text.length - newText.length;
                this.value = newText;
                this.setSelectionRange(cursorPosition - diff, cursorPosition - diff); 
            }
        });

        // --- ระบบ 1: อัปโหลดรูปลูกค้าเข้า ImgBB ---
        function setupImageUpload(inputId, statusId, hiddenUrlId) {
            const uploadInput = document.getElementById(inputId);
            const statusEl = document.getElementById(statusId);
            const hiddenUrlEl = document.getElementById(hiddenUrlId);

            uploadInput.addEventListener('change', async function() {
                const file = this.files[0];
                if (!file) return;

                uploadingCount++;
                generateBtn.disabled = true;
                generateBtn.innerText = "กำลังประมวลผลรูปภาพ...";
                statusEl.style.color = "#f59e0b";
                statusEl.innerText = "กำลังอัปโหลดรูปภาพ... ⏳";

                const formData = new FormData();
                formData.append('image', file);

                try {
                    const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                        method: 'POST', body: formData
                    });
                    const data = await response.json();
                    if (data.success) {
                        hiddenUrlEl.value = data.data.url; 
                        statusEl.style.color = "#10b981";
                        statusEl.innerText = "✅ อัปโหลดรูปสำเร็จแล้ว!";
                    } else {
                        throw new Error("Upload failed");
                    }
                } catch (error) {
                    statusEl.style.color = "#ef4444";
                    statusEl.innerText = "❌ อัปโหลดไม่สำเร็จ กรุณาลองใหม่";
                    hiddenUrlEl.value = "";
                } finally {
                    uploadingCount--;
                    if (uploadingCount === 0) {
                        generateBtn.disabled = false;
                        generateBtn.innerText = `สร้างการ์ดของขวัญ`;
                    }
                }
            });
        }

        setupImageUpload('imageUpload1', 'uploadStatus1', 'imgInputUrl1');
        setupImageUpload('imageUpload2', 'uploadStatus2', 'imgInputUrl2');

        // --- ระบบ 2: สร้าง URL จริงและย่อลิงก์ (Production Ready) ---
        generateBtn.addEventListener('click', () => {
            const msgRaw = document.getElementById('msgInput').value.trim();
            const url1 = document.getElementById('imgInputUrl1').value;
            const url2 = document.getElementById('imgInputUrl2').value;
            
            if(!msgRaw) { alert("กรุณากรอกข้อความอวยพรก่อนครับ!"); return; }

            generateBtn.disabled = true;
            generateBtn.innerText = "กำลังสร้างลิงก์... ⏳";

            const formattedMsg = msgRaw.replace(/\n/g, '|');
            
            // ดึง URL จริงของเว็บไซต์ (ถ้ารันบน Github ก็จะดึงโดเมน Github มา)
            let currentPath = window.location.href.substring(0, window.location.href.lastIndexOf('/'));
            let longUrl = `${currentPath}/${BASE_CARD_URL}?text=${encodeURIComponent(formattedMsg)}`;
            
            let validUrls = [];
            if (url1) validUrls.push(url1);
            if (url2) validUrls.push(url2);
            if(validUrls.length > 0) {
                longUrl += `&img=${encodeURIComponent(validUrls.join(','))}`;
            }

            // ใช้ JSONP ย่อลิงก์
            const callbackName = 'shortenCallback_' + Math.round(100000 * Math.random());
            window[callbackName] = function(data) {
                delete window[callbackName]; 
                
                // ถ้าย่อสำเร็จจะได้ลิงก์สั้น ถ้าไม่ได้ (เช่นทดสอบในคอม) จะโชว์ลิงก์ยาว
                generatedUrl = data.shorturl ? data.shorturl : longUrl; 

                formSection.style.display = 'none';
                resultSection.style.display = 'block'; 
                finalLinkBox.innerText = generatedUrl;
                testBtn.href = generatedUrl;
                
                generateBtn.disabled = false;
                generateBtn.innerText = `สร้างการ์ดของขวัญ`;
            };

            const script = document.createElement('script');
            script.src = `https://is.gd/create.php?format=json&url=${encodeURIComponent(longUrl)}&callback=${callbackName}`;
            document.body.appendChild(script);

            setTimeout(() => {
                if (window[callbackName]) {
                    window[callbackName]({ error: true });
                }
            }, 5000);
        });

        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(generatedUrl).then(() => {
                copyBtn.innerText = "✅ ก๊อปปี้สำเร็จ!";
                copyBtn.style.background = "#10b981";
                setTimeout(() => {
                    copyBtn.innerText = "📋 ก๊อปปี้ลิงก์";
                    copyBtn.style.background = "#4facfe";
                }, 2000);
            });
        });
    </script>
</body>
</html>
