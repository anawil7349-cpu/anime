<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>สร้างการ์ดวันเกิด 3D พรีเมียม | 3D Birthday Card Creator</title>
    <link rel="icon" href="data:,">
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
    <style>
        /* =========================================
           --- โทนสีล้ำสมัย & ตัวแปร ---
           ========================================= */
        :root {
            --primary: #ff0844;
            --primary-gradient: linear-gradient(135deg, #ff0844 0%, #ffb199 100%);
            --secondary: #4facfe;
            --success: #00f2fe;
            --success-color: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            
            --text-main: #1e293b;
            --text-muted: #64748b;
            
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.6);
            --shadow-glass: 0 20px 40px -10px rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,255,0.5);
            --shadow-glow: 0 10px 25px -5px rgba(255, 8, 68, 0.4);
            
            --radius-lg: 30px;
            --radius-md: 20px;
            --radius-sm: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Mali', sans-serif; }
        
        body { 
            background-color: #fdfbfb;
            background-image: 
                radial-gradient(at 0% 0%, hsla(343, 100%, 76%, 0.4) 0px, transparent 50%),
                radial-gradient(at 100% 0%, hsla(204, 100%, 76%, 0.5) 0px, transparent 50%),
                radial-gradient(at 100% 100%, hsla(43, 100%, 74%, 0.4) 0px, transparent 50%),
                radial-gradient(at 0% 100%, hsla(271, 100%, 76%, 0.4) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main); 
            display: flex; justify-content: center; align-items: flex-start;
            min-height: 100vh; 
            padding: 20px 15px;
            line-height: 1.6;
            overflow-x: hidden;
        }
        
        .container { 
            background: var(--glass-bg); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            width: 100%; max-width: 480px; 
            padding: 35px 25px; 
            border-radius: var(--radius-lg); 
            box-shadow: var(--shadow-glass); 
            border: 1px solid var(--glass-border);
            position: relative;
            margin: auto; 
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { 
            text-align: center; 
            margin-bottom: 25px; 
            font-size: clamp(1.6rem, 5vw, 2.2rem); 
            font-weight: 800;
            display: flex; flex-direction: column; align-items: center; gap: 5px;
            line-height: 1.3;
        }
        h1 .text-gradient {
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            display: inline-block;
        }
        h1 span.icon { 
            font-size: clamp(2.5rem, 8vw, 3.5rem); 
            margin-bottom: 5px; 
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.1));
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }
        
        .form-group { margin-bottom: 20px; }
        
        label { 
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 8px; font-weight: 700; color: #334155; font-size: 1rem;
        }
        label i { color: var(--primary); font-size: 1.1rem;}
        
        .input-wrapper { position: relative; }
        
        input[type="text"], textarea { 
            width: 100%; padding: 15px; 
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid transparent; 
            border-radius: var(--radius-md); 
            font-size: 1rem; outline: none; transition: all 0.3s; 
            color: var(--text-main);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), inset 0 2px 4px rgba(0,0,0,0.02);
            word-wrap: break-word;
            white-space: pre-wrap;
        }
        input[type="text"]:focus, textarea:focus { 
            border-color: #ffb199; 
            background: white;
            box-shadow: 0 0 0 4px rgba(255, 8, 68, 0.15);
            transform: translateY(-2px);
        }
        textarea { resize: vertical; min-height: 100px; }

        .file-upload-wrapper {
            position: relative;
            background: rgba(255,255,255,0.6);
            border: 2px dashed #cbd5e1;
            border-radius: var(--radius-md);
            padding: 20px 15px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .file-upload-wrapper:hover {
            border-color: var(--secondary);
            background: rgba(240, 249, 255, 0.8);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(79, 172, 254, 0.1);
        }
        .file-upload-wrapper i {
            font-size: 2.2rem;
            color: #94a3b8;
            margin-bottom: 10px;
            transition: color 0.3s ease;
        }
        .file-upload-wrapper:hover i { color: var(--secondary); transform: scale(1.1); }
        .file-upload-wrapper p { 
            margin: 0; color: var(--text-main); font-size: 0.95rem; font-weight: 600;
            max-width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .file-upload-wrapper span.sub-text { display: block; color: var(--text-muted); font-size: 0.8rem; margin-top: 4px;}
        
        input[type="file"] { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; cursor: pointer; z-index: 10;
        }
        
        .upload-status { font-size: 0.9rem; margin-top: 8px; font-weight: 700; min-height: 20px; display: flex; justify-content: center; align-items: center; gap: 5px; text-align: center;}
        
        .btn { 
            width: 100%; padding: 16px; 
            border: none; border-radius: 100px; 
            font-size: 1.1rem; font-weight: 700; cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            display: flex; justify-content: center; align-items: center; gap: 8px;
            position: relative; overflow: hidden;
            word-break: break-word;
        }
        
        .btn-primary {
            background: var(--primary-gradient); color: white;
            box-shadow: var(--shadow-glow);
            margin-top: 10px;
        }
        .btn-primary::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transform: skewX(-20deg); transition: 0.5s;
        }
        .btn-primary:hover:not(:disabled) { 
            transform: translateY(-3px) scale(1.02); 
            box-shadow: 0 15px 30px -5px rgba(255, 8, 68, 0.5); 
        }
        .btn-primary:hover:not(:disabled)::after { left: 150%; }
        .btn-primary:active:not(:disabled) { transform: translateY(1px); }
        .btn-primary:disabled { 
            background: #cbd5e1; color: #f8fafc; cursor: not-allowed; box-shadow: none; transform: none; 
        }

        .btn-copy-main { background: white; color: var(--text-main); border: 2px solid #cbd5e1; margin-bottom: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);}
        .btn-copy-main:hover { border-color: var(--secondary); color: var(--secondary); transform: translateY(-2px); box-shadow: 0 10px 20px rgba(79, 172, 254, 0.2);}
        
        .btn-preview { 
            background: linear-gradient(135deg, #10b981, #059669); color: white; 
            box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.4); text-decoration: none; 
        }
        .btn-preview:hover { transform: translateY(-2px) scale(1.02); box-shadow: 0 15px 30px -5px rgba(16, 185, 129, 0.5);}

        .btn-outline {
            background: transparent; color: var(--text-muted); border: 2px solid #cbd5e1; margin-top: 15px; box-shadow: none;
        }
        .btn-outline:hover {
            border-color: var(--text-main); color: var(--text-main); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        #resultSection { 
            display: none; 
            animation: scaleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes scaleIn { 
            from { opacity: 0; transform: scale(0.95); } 
            to { opacity: 1; transform: scale(1); } 
        }
        
        .section-header { text-align: center; margin-bottom: 20px;}
        .section-header h2 { color: var(--text-main); font-size: clamp(1.3rem, 4vw, 1.6rem); margin-bottom: 5px; display: flex; align-items: center; justify-content: center; gap: 8px;}
        .section-header p { color: var(--text-muted); font-size: 0.95rem; font-weight: 500;}

        .result-box { 
            background: #f0fdf4; padding: 20px 15px; border-radius: var(--radius-md); 
            margin-bottom: 20px; word-break: break-all; font-size: 1.1rem; color: var(--success-color); 
            border: 2px solid #86efac; text-align: center; font-weight: 700;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.02), 0 10px 15px rgba(16, 185, 129, 0.1);
        }
        
        .fa-spin { animation: fa-spin 1.5s infinite linear; }
        @keyframes fa-spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(359deg); } }

    </style>
</head>
<body>

    <div class="container">
        
        <div id="formSection">
            <h1>
                <span class="icon">🥳</span> 
                <span class="text-gradient">สร้างการ์ดวันเกิด 3D</span>
            </h1>
            
            <div class="form-group">
                <label for="msgInput"><i class="fa-solid fa-pen-nib"></i> คำอวยพรสุดพิเศษ</label>
                <div class="input-wrapper">
                    <textarea id="msgInput" placeholder="ใส่คำอวยพรตรงนี้ เช่น สุขสันต์วันเกิดนะ!ขอให้มีความสุขมากๆ 💖&#10;"></textarea>
                </div>
            </div>
            
            <div class="form-group">
                <label><i class="fa-solid fa-image"></i> ใส่รูปภาพ (สูงสุด 2 รูป)</label>
                
                <div class="file-upload-wrapper" style="margin-bottom: 12px;">
                    <i class="fa-regular fa-image"></i>
                    <p>อัปโหลดรูปภาพที่ 1</p>
                    <span class="sub-text">แตะเพื่อเลือกรูปภาพ</span>
                    <input type="file" id="imageUpload1" accept="image/*">
                </div>
                <div class="upload-status" id="uploadStatus1" style="color: var(--text-muted);"></div>
                <input type="hidden" id="imgInputUrl1"> 

                <div class="file-upload-wrapper" style="margin-top: 15px;">
                    <i class="fa-regular fa-images"></i>
                    <p>อัปโหลดรูปภาพที่ 2 <span style="color:var(--text-muted); font-weight:500;">(ไม่บังคับ)</span></p>
                    <span class="sub-text">แตะเพื่อเลือกรูปภาพเพิ่ม</span>
                    <input type="file" id="imageUpload2" accept="image/*">
                </div>
                <div class="upload-status" id="uploadStatus2" style="color: var(--text-muted);"></div>
                <input type="hidden" id="imgInputUrl2"> 
            </div>
            
            <button class="btn btn-primary" id="generateBtn" disabled>
                <i class="fa-solid fa-wand-magic-sparkles"></i> สร้างการ์ดของขวัญ
            </button>
        </div>

        <div id="resultSection">
            <div class="section-header">
                <h2 style="color: var(--success-color);"><i class="fa-solid fa-circle-check fa-bounce"></i> เสร็จสมบูรณ์!</h2>
                <p>การ์ดวันเกิด 3D ของคุณพร้อมใช้งานแล้ว</p>
                <p style="font-size: 0.85rem; color: var(--warning); margin-top: 5px;">* ระบบได้ดาวน์โหลดไฟล์ลิงก์สำรองไว้ในเครื่องของคุณแล้ว</p>
            </div>
            
            <div class="result-box" id="finalLink"></div>
            
            <button class="btn btn-copy-main" id="copyBtn">
                <i class="fa-solid fa-link"></i> คัดลอกลิงก์ส่งให้คนพิเศษได้เลย
            </button>
            <a href="#" target="_blank" class="btn btn-preview" id="testBtn">
                <i class="fa-solid fa-play"></i> เปิดดูการ์ดของคุณ
            </a>

            <button class="btn btn-outline" id="homeBtn">
                <i class="fa-solid fa-house"></i> กลับหน้าแรก (สร้างใบใหม่)
            </button>
        </div>
    </div>

    <script>
        // ==========================================
        // ⚙️ การตั้งค่าระบบ API 
        // ==========================================
        
        const IMGBB_API_KEY = "d29f8833a989e9577e146d4f77d54c90"; 
        const BASE_CARD_URL = "card.html"; 

        let generatedUrl = ""; 
        let uploadingCount = 0; 

        const formSection = document.getElementById('formSection');
        const resultSection = document.getElementById('resultSection');
        
        const generateBtn = document.getElementById('generateBtn');
        const copyBtn = document.getElementById('copyBtn');
        const finalLinkBox = document.getElementById('finalLink');
        const testBtn = document.getElementById('testBtn');
        const msgInput = document.getElementById('msgInput'); 
        
        const homeBtn = document.getElementById('homeBtn');

        // ฟังก์ชันตรวจสอบความถูกต้องของฟอร์ม (เพื่อเปิด/ปิดปุ่ม)
        function checkFormValidity() {
            const msg = msgInput.value.trim();
            const url1 = document.getElementById('imgInputUrl1').value;
            
            // เงื่อนไข: ต้องมีข้อความ และ ต้องมีรูปภาพที่ 1 อัปโหลดเสร็จแล้ว
            if (msg !== "" && url1 !== "" && uploadingCount === 0) {
                generateBtn.disabled = false;
            } else {
                generateBtn.disabled = true;
            }
        }

        function downloadBackupLink(url) {
            const textContent = `🎉 ขอบคุณที่ใช้งาน! 🎉\n\nนี่คือลิงก์การ์ดวันเกิด 3D ของคุณ (เก็บไฟล์นี้ไว้เผื่อลืมลิงก์นะครับ):\n\n👉 ${url} 👈\n\nคัดลอกลิงก์นี้แล้วส่งให้คนพิเศษได้เลยครับ! 💖`;
            
            const blob = new Blob([textContent], { type: 'text/plain;charset=utf-8' });
            const downloadAnchor = document.createElement("a");
            
            downloadAnchor.href = URL.createObjectURL(blob);
            downloadAnchor.download = "ลิงก์การ์ดวันเกิด3D_ของคุณ.txt"; 
            
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click(); 
            document.body.removeChild(downloadAnchor);
        }

        // ==========================================
        // ✨ ระบบปัดบรรทัดอัตโนมัติ (Auto-Wrap) ✨
        // ==========================================
        const MAX_CHARS_PER_LINE = 22; 
        const segmenter = new Intl.Segmenter('th-TH', { granularity: 'grapheme' });
        
        msgInput.addEventListener('input', function() {
            let text = this.value;
            let cursorPosition = this.selectionStart;
            
            let lines = text.split('\n');
            let newLines = [];
            
            for (let i = 0; i < lines.length; i++) {
                let graphemes = Array.from(segmenter.segment(lines[i])).map(s => s.segment);
                
                if (graphemes.length > MAX_CHARS_PER_LINE) {
                    for (let j = 0; j < graphemes.length; j += MAX_CHARS_PER_LINE) {
                        newLines.push(graphemes.slice(j, j + MAX_CHARS_PER_LINE).join(''));
                    }
                } else {
                    newLines.push(lines[i]);
                }
            }
            
            let newText = newLines.join('\n'); 
            
            if (text !== newText) {
                let diff = newText.length - text.length; 
                this.value = newText;
                this.setSelectionRange(cursorPosition + diff, cursorPosition + diff); 
            }
            checkFormValidity(); // เช็คความถูกต้องทุกครั้งที่พิมพ์
        });

        // --- ระบบอัปโหลดรูปลูกค้าเข้า ImgBB ---
        function setupImageUpload(inputId, statusId, hiddenUrlId) {
            const uploadInput = document.getElementById(inputId);
            const statusEl = document.getElementById(statusId);
            const hiddenUrlEl = document.getElementById(hiddenUrlId);
            const wrapper = uploadInput.parentElement;
            const icon = wrapper.querySelector('i');
            const text = wrapper.querySelector('p');
            const subText = wrapper.querySelector('span');

            uploadInput.addEventListener('change', async function() {
                const file = this.files[0];
                if (!file) return;

                uploadingCount++;
                generateBtn.disabled = true;
                generateBtn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> กำลังอัปโหลด...`;
                
                icon.className = "fa-solid fa-cloud-arrow-up fa-bounce";
                icon.style.color = "var(--secondary)";
                text.innerText = "กำลังอัปโหลดรูปภาพ...";
                subText.innerText = "กรุณารอสักครู่ ⏳";
                statusEl.innerHTML = "";

                const formData = new FormData();
                formData.append('image', file);

                try {
                    const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                        method: 'POST', body: formData
                    });
                    const data = await response.json();
                    if (data.success) {
                        hiddenUrlEl.value = data.data.url; 
                        icon.className = "fa-solid fa-circle-check";
                        icon.style.color = "var(--success-color)";
                        text.innerText = file.name.length > 15 ? file.name.substring(0, 15) + "..." : file.name;
                        subText.innerText = "อัปโหลดเสร็จสมบูรณ์ ✅";
                        wrapper.style.borderColor = "var(--success-color)";
                        wrapper.style.background = "#f0fdf4";
                    } else {
                        throw new Error("Upload failed");
                    }
                } catch (error) {
                    icon.className = "fa-solid fa-circle-xmark";
                    icon.style.color = "var(--danger)";
                    text.innerText = "อัปโหลดล้มเหลว";
                    subText.innerText = "แตะเพื่อลองใหม่อีกครั้ง";
                    wrapper.style.borderColor = "var(--danger)";
                    wrapper.style.background = "#fef2f2";
                    hiddenUrlEl.value = "";
                } finally {
                    uploadingCount--;
                    generateBtn.innerHTML = `<i class="fa-solid fa-wand-magic-sparkles"></i> สร้างการ์ดของขวัญ`;
                    checkFormValidity(); // เช็คความถูกต้องหลังอัปโหลดเสร็จ
                }
            });
        }

        setupImageUpload('imageUpload1', 'uploadStatus1', 'imgInputUrl1');
        setupImageUpload('imageUpload2', 'uploadStatus2', 'imgInputUrl2');

        // --- ระบบสร้าง URL -> เด้งไปหน้าผลลัพธ์ทันที ---
        generateBtn.addEventListener('click', () => {
            const msgRaw = document.getElementById('msgInput').value.trim();
            const url1 = document.getElementById('imgInputUrl1').value;
            const url2 = document.getElementById('imgInputUrl2').value;
            
            if(!msgRaw || !url1) return; // กันเหนียวไว้อีกชั้น

            generateBtn.disabled = true;
            generateBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> กำลังเตรียมการ์ด...`;

            const formattedMsg = msgRaw.replace(/\n/g, '|');
            
            let currentPath = window.location.href.substring(0, window.location.href.lastIndexOf('/'));
            let longUrl = `${currentPath}/${BASE_CARD_URL}?text=${encodeURIComponent(formattedMsg)}`;
            
            let validUrls = [];
            if (url1) validUrls.push(url1);
            if (url2) validUrls.push(url2);
            if(validUrls.length > 0) {
                longUrl += `&img=${encodeURIComponent(validUrls.join(','))}`;
            }

            const callbackName = 'shortenCallback_' + Math.round(100000 * Math.random());
            window[callbackName] = function(data) {
                delete window[callbackName]; 
                
                generatedUrl = data.shorturl ? data.shorturl : longUrl; 

                // ปิดหน้ากรอกข้อมูล และโชว์หน้าผลลัพธ์ทันที
                formSection.style.display = 'none';
                resultSection.style.display = 'block'; 
                finalLinkBox.innerText = generatedUrl;
                testBtn.href = generatedUrl;
                window.scrollTo({ top: 0, behavior: 'smooth' }); 
                
                // โหลดไฟล์สำรองอัตโนมัติ
                downloadBackupLink(generatedUrl);
            };

            const script = document.createElement('script');
            script.src = `https://is.gd/create.php?format=json&url=${encodeURIComponent(longUrl)}&callback=${callbackName}`;
            document.body.appendChild(script);

            setTimeout(() => {
                if (window[callbackName]) {
                    window[callbackName]({ error: true });
                }
            }, 5000);
        });

        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(generatedUrl).then(() => {
                const oldHTML = copyBtn.innerHTML;
                copyBtn.innerHTML = `<i class="fa-solid fa-check-double"></i> คัดลอกลิงก์สำเร็จ!`;
                copyBtn.style.background = "var(--success-color)";
                copyBtn.style.color = "white";
                copyBtn.style.borderColor = "var(--success-color)";
                setTimeout(() => {
                    copyBtn.innerHTML = oldHTML;
                    copyBtn.style.background = "white";
                    copyBtn.style.color = "var(--text-main)";
                    copyBtn.style.borderColor = "#cbd5e1";
                }, 2000);
            });
        });

        homeBtn.addEventListener('click', () => {
            window.location.reload(); 
        });

    </script>
</body>
</html>
