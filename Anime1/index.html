<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สร้างการ์ดวันเกิด 3D ของคุณ</title>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Mali', sans-serif; }
        body { background-color: #f0f4f8; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        .container { background: white; width: 100%; max-width: 500px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #ff3366; margin-bottom: 20px; font-size: 1.8rem; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input[type="text"], textarea { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 1rem; outline: none; transition: border 0.3s; }
        input[type="text"]:focus, textarea:focus { border-color: #ff3366; }
        
        /* สไตล์ช่องอัปโหลด */
        input[type="file"] { width: 100%; padding: 10px; border: 2px dashed #cbd5e1; border-radius: 10px; cursor: pointer; background: #f8fafc; transition: all 0.3s ease; }
        input[type="file"]:hover { border-color: #ff3366; }
        .upload-status { font-size: 0.9rem; margin-top: 5px; color: #10b981; font-weight: bold; }
        
        .btn { width: 100%; padding: 15px; background: linear-gradient(to right, #ff3366, #ff6b9e); color: white; border: none; border-radius: 10px; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; margin-top: 10px; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 51, 102, 0.4); }
        .btn:disabled { background: #cbd5e1; cursor: not-allowed; box-shadow: none; transform: none; }

        #paymentSection, #resultSection { display: none; text-align: center; margin-top: 20px; padding-top: 20px; border-top: 2px dashed #e2e8f0; }
        .result-box { background: #f8fafc; padding: 15px; border-radius: 10px; margin-bottom: 15px; word-break: break-all; font-size: 0.9rem; color: #0f172a; border: 1px solid #e2e8f0; text-align: left;}
        
        .btn-copy { background: #4facfe; margin-bottom: 10px; }
        .btn-test { background: #10b981; }
    </style>
</head>
<body>

    <div class="container">
        <h1>✨ สร้างการ์ดวันเกิด 3D</h1>
        
        <div id="formSection">
            <div class="form-group">
                <label>ข้อความอวยพร (เว้นบรรทัดได้เลย):</label>
                <textarea id="msgInput" rows="4" placeholder="สุขสันต์วันเกิดนะ!&#10;ขอให้มีความสุขมากๆ 💖"></textarea>
            </div>
            
            <div class="form-group">
                <label>อัปโหลดรูปภาพเจ้าของวันเกิด:</label>
                <input type="file" id="imageUpload" accept="image/*">
                <div class="upload-status" id="uploadStatus"></div>
                <input type="hidden" id="imgInputUrl"> 
            </div>
            
            <button class="btn" id="generateBtn" disabled>รออัปโหลดรูปภาพ...</button>
        </div>

        <div id="paymentSection">
            <h2 style="color: #333;">ชำระเงินเพื่อรับลิงก์</h2>
            <p style="color: #666; font-size: 0.9rem;">(กรุณาโอนให้ตรงยอด 49.00 บาทเป๊ะๆ)</p>
            
            <img src="https://i.ibb.co/wZw4CBft/QR.jpg" alt="QR Code" style="width: 200px; border-radius: 10px; margin: 15px 0; border: 2px solid #ff3366;">
            
            <div class="form-group" style="text-align: left;">
                <label>แนบรูปสลิปโอนเงิน (AI จะตรวจสอบทันที):</label>
                <input type="file" id="slipUpload" accept="image/*" style="border-color: #10b981;">
                <div class="upload-status" id="slipStatus" style="color: #10b981; margin-top: 10px;"></div>
            </div>
        </div>

        <div id="resultSection">
            <h2 style="color: #10b981; margin-bottom: 10px;">🎉 การ์ดของคุณพร้อมแล้ว!</h2>
            <p style="color: #666; font-size: 0.9rem; margin-bottom: 10px;">ก๊อปปี้ลิงก์ด้านล่างนี้ ส่งให้คนพิเศษได้เลย</p>
            <div class="result-box" id="finalLink"></div>
            <button class="btn btn-copy" id="copyBtn">📋 ก๊อปปี้ลิงก์</button>
            <a href="#" target="_blank" class="btn btn-test" id="testBtn" style="display: block; text-decoration: none; text-align: center;">▶️ กดทดสอบลิงก์</a>
        </div>
    </div>

    <script>
        // ==========================================
        // ⚙️ การตั้งค่าระบบทั้งหมด (Configuration)
        // ==========================================
        
        // 1. API สำหรับอัปโหลดรูปภาพ (ImgBB)
        const IMGBB_API_KEY = "d29f8833a989e9577e146d4f77d54c90"; // 🚨 อย่าลืมแก้ตรงนี้นะครับ! 🚨

        // 2. API สำหรับตรวจสลิปอัตโนมัติ (SlipOK)
        const SLIPOK_API_KEY = "SLIPOKAK79JIJ"; 
        const SLIPOK_BRANCH_ID = "61190"; 

        // 3. ข้อมูลร้านค้าของคุณ
        const EXPECTED_AMOUNT = 49.00; // ราคาการ์ด (บาท)
        const RECEIVER_KEYWORD = "อนาวิล ชัยภาคย์พิบูล"; // คีย์เวิร์ดชื่อบัญชีของคุณ เพื่อป้องกันสลิปปลอม
        const BASE_CARD_URL = "card.html"; // ชื่อไฟล์การ์ด 3D
        
        // ==========================================

        let generatedUrl = "";

        const formSection = document.getElementById('formSection');
        const paymentSection = document.getElementById('paymentSection');
        const resultSection = document.getElementById('resultSection');
        
        const generateBtn = document.getElementById('generateBtn');
        const copyBtn = document.getElementById('copyBtn');
        const finalLinkBox = document.getElementById('finalLink');
        const testBtn = document.getElementById('testBtn');

        // --- ระบบ 1: อัปโหลดรูปลูกค้าเข้า ImgBB ---
        const imageUpload = document.getElementById('imageUpload');
        const uploadStatus = document.getElementById('uploadStatus');
        const imgInputUrl = document.getElementById('imgInputUrl');

        generateBtn.disabled = false;
        generateBtn.innerText = `สร้างการ์ด (฿${EXPECTED_AMOUNT})`;

        imageUpload.addEventListener('change', async function() {
            const file = this.files[0];
            if (!file) return;

            generateBtn.disabled = true;
            generateBtn.innerText = "กำลังประมวลผล...";
            uploadStatus.style.color = "#f59e0b";
            uploadStatus.innerText = "กำลังอัปโหลดรูปภาพ... ⏳";

            const formData = new FormData();
            formData.append('image', file);

            try {
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success) {
                    imgInputUrl.value = data.data.url; 
                    uploadStatus.style.color = "#10b981";
                    uploadStatus.innerText = "✅ อัปโหลดรูปสำเร็จแล้ว!";
                    generateBtn.disabled = false;
                    generateBtn.innerText = `สร้างการ์ด (฿${EXPECTED_AMOUNT})`;
                } else {
                    throw new Error("Upload failed");
                }
            } catch (error) {
                uploadStatus.style.color = "#ef4444";
                uploadStatus.innerText = "❌ อัปโหลดรูปไม่สำเร็จ กรุณาลองใหม่";
                generateBtn.disabled = false;
                generateBtn.innerText = `สร้างการ์ดแบบไม่มีรูป (฿${EXPECTED_AMOUNT})`;
            }
        });

        // --- ระบบ 2: สร้าง URL ลิงก์ยาวๆ ---
        generateBtn.addEventListener('click', () => {
            const msgRaw = document.getElementById('msgInput').value.trim();
            const uploadedImgLink = imgInputUrl.value;
            
            if(!msgRaw) {
                alert("กรุณากรอกข้อความอวยพรก่อนครับ!");
                return;
            }

            const formattedMsg = msgRaw.replace(/\n/g, '|');
            let currentPath = window.location.href.substring(0, window.location.href.lastIndexOf('/'));
            
            generatedUrl = `${currentPath}/${BASE_CARD_URL}?text=${encodeURIComponent(formattedMsg)}`;
            
            if(uploadedImgLink) {
                generatedUrl += `&img=${encodeURIComponent(uploadedImgLink)}`;
            }

            formSection.style.display = 'none';
            paymentSection.style.display = 'block';
        });

        // --- ระบบ 3: เช็คสลิปอัตโนมัติผ่าน SlipOK ---
        const slipUpload = document.getElementById('slipUpload');
        const slipStatus = document.getElementById('slipStatus');

        slipUpload.addEventListener('change', async function() {
            const file = this.files[0];
            if (!file) return;

            slipStatus.style.color = "#f59e0b";
            slipStatus.innerText = "🤖 AI กำลังอ่านสลิปและตรวจสอบกับธนาคาร... ⏳";
            slipUpload.disabled = true;

            const formData = new FormData();
            formData.append('files', file); 

            try {
                const response = await fetch(`https://api.slipok.com/api/line/apikey/${SLIPOK_BRANCH_ID}`, {
                    method: 'POST',
                    headers: {
                        'x-authorization': SLIPOK_API_KEY
                    },
                    body: formData
                });

                const data = await response.json();

                if (data.success === true) {
                    const amount = data.data.amount;
                    // ดึงชื่อผู้รับ หรือถ้า API ไม่ส่งมาให้ตั้งเป็นค่าว่างกันพัง
                    const receiverName = data.data.receiver.displayName || ""; 

                    // เช็คด่านที่ 1: ชื่อบัญชีผู้รับตรงไหม?
                    if (!receiverName.includes(RECEIVER_KEYWORD)) {
                        throw new Error("ชื่อบัญชีผู้รับเงินไม่ถูกต้อง!");
                    }

                    // เช็คด่านที่ 2: โอนมาครบยอดไหม?
                    if (amount >= EXPECTED_AMOUNT) {
                        slipStatus.style.color = "#10b981";
                        slipStatus.innerText = `✅ ยอดเงิน ${amount} บาท ถูกต้อง! กำลังปลดล็อกลิงก์...`;
                        
                        // หน่วงเวลาให้ลูกค้าเห็นข้อความผ่าน แล้วโชว์ลิงก์
                        setTimeout(() => {
                            paymentSection.style.display = 'none';
                            resultSection.style.display = 'block';
                            finalLinkBox.innerText = generatedUrl;
                            testBtn.href = generatedUrl;
                        }, 1500);
                    } else {
                        throw new Error(`ยอดเงินไม่ครบ (ต้องการ ฿${EXPECTED_AMOUNT} แต่โอนมา ฿${amount})`);
                    }

                } else {
                    throw new Error(data.message || "สลิปไม่ถูกต้อง หรือถูกใช้งานไปแล้ว");
                }

            } catch (error) {
                slipStatus.style.color = "#ef4444";
                slipStatus.innerText = `❌ ${error.message} กรุณาแนบสลิปใหม่ครับ`;
                slipUpload.disabled = false; 
                slipUpload.value = ''; 
            }
        });

        // --- ปุ่ม Copy ---
        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(generatedUrl).then(() => {
                copyBtn.innerText = "✅ ก๊อปปี้สำเร็จ!";
                copyBtn.style.background = "#10b981";
                setTimeout(() => {
                    copyBtn.innerText = "📋 ก๊อปปี้ลิงก์";
                    copyBtn.style.background = "#4facfe";
                }, 2000);
            });
        });
    </script>
</body>
</html>
